<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDPA Rules</title>
  <meta name="description" content="Read the IDPA rulebook. Spot what changed between versions.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-bar">
      <div class="header-row">
        <h1 id="app-title" role="button" tabindex="0" title="Reset to a fresh comparison">IDPA Rules</h1>
        <p class="tagline">Read the rulebook. Spot what
          <button type="button" id="show-changed" class="tagline-link"
                  title="Compare the latest rulebook to the previous year">changed</button>.</p>
      </div>
      <div class="header-actions">
        <button type="button" id="settings-toggle" class="btn-ghost settings-toggle"
                aria-expanded="false" aria-controls="controls" title="Show comparison settings">⚙ Settings</button>
        <div class="nav-buttons">
          <span class="diff-counter" id="diff-counter" role="status" aria-live="polite"></span>
          <button type="button" id="prev-diff" class="btn-ghost" title="Previous difference (p)" aria-label="Previous difference">↑ Prev</button>
          <button type="button" id="next-diff" class="btn-ghost" title="Next difference (n)" aria-label="Next difference">Next ↓</button>
        </div>
      </div>
    </div>

    <div class="doc-bar">
      <nav class="doc-tabs" id="doc-tabs" aria-label="Document"></nav>
      <div class="search-box" role="search">
        <input type="search" id="search-input" placeholder="Search…  ( / )" aria-label="Search the document" autocomplete="off" spellcheck="false">
        <button type="button" id="search-clear" class="search-clear" title="Clear search (Esc)" aria-label="Clear search">×</button>
        <span class="search-count" id="search-count" role="status" aria-live="polite"></span>
        <button type="button" id="search-prev" class="btn-ghost" title="Previous match (Shift+Enter)" aria-label="Previous match">▲</button>
        <button type="button" id="search-next" class="btn-ghost" title="Next match (Enter)" aria-label="Next match">▼</button>
        <label class="search-only" title="Show only rules that contain the search term"><input type="checkbox" id="search-matches-only"> Only matches</label>
      </div>
    </div>

    <form class="controls" id="controls" aria-label="Comparison controls">
      <div class="control-group versions">
        <label>Base
          <select id="base-select" aria-label="Base year"></select>
        </label>
        <span class="arrow" aria-hidden="true">→</span>
        <label>Compare
          <select id="compare-select" aria-label="Compare year"></select>
        </label>
        <button type="button" id="swap" class="btn-ghost" title="Swap base and compare">⇄ Swap</button>
      </div>

      <div class="version-meta" id="version-meta" aria-live="polite"></div>

      <fieldset class="control-group toggles">
        <legend>Ignore</legend>
        <label><input type="checkbox" id="opt-whitespace"> Whitespace</label>
        <label><input type="checkbox" id="opt-quotes"> Quotes &amp; dashes</label>
        <label><input type="checkbox" id="opt-punctuation"
                      title="Ignore commas, periods, apostrophes, and hyphenation differences (Club-based vs Club based)"> Punctuation &amp; hyphenation</label>
        <label><input type="checkbox" id="opt-case"> Case</label>
      </fieldset>

      <fieldset class="control-group toggles">
        <legend>View</legend>
        <label><input type="radio" name="view" id="view-sbs"> Side by side</label>
        <label><input type="radio" name="view" id="view-uni"> Document (inline changes)</label>
      </fieldset>

      <div class="control-group filter">
        <label><input type="checkbox" id="opt-changed"> Changed rules only</label>
        <label><input type="checkbox" id="opt-sections"> Sections in sidebar</label>
        <label><input type="checkbox" id="opt-emphasize"> Emphasize changes (underline/strikethrough)</label>
      </div>
    </form>

    <div class="summary-bar" id="summary" role="status" aria-live="polite"></div>
  </header>

  <div class="layout">
    <nav class="toc" id="toc" aria-label="Chapters with changes"></nav>
    <main class="changes" id="changes" tabindex="-1"></main>
  </div>

  <footer class="app-footer">
    <p>Diffing by <a href="https://github.com/kpdecker/jsdiff" rel="noopener">jsdiff</a>.
       Rule text shown verbatim; normalization affects comparison only.</p>
  </footer>

  <!-- jsdiff, pinned and self-hosted. Then the app modules (attach to window), then the UI. -->
  <script src="vendor/diff.js"></script>
  <script src="normalize.js"></script>
  <script src="parser.js"></script>
  <script src="diff.js"></script>
  <script src="ui.js"></script>
</body>
</html>
